<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
<link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
 
<div class="frame">
   <div class="corner_topleft"></div>
   <div class="corner_topright"></div>
   <div class="corner_bottomleft"></div>
   <div class="corner_bottomright"></div>
   
   
   <div class="camera">
      <div class="start-overlay">
         <div class="start-title-block">
            <img class="start-title-image pixel-art" src="./assets/title.png" alt="From Level Zero to AI Product Hero">
            <div class="start-aiph pixel-art" aria-hidden="true"></div>
         </div>
         <p class="start-prompt">PRESS START</p>
      </div>
      <div class="stars" aria-hidden="true">
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
         <span class="star"></span>
      </div>
      <div class="map pixel-art">
         <div class="map-layers" aria-hidden="true">
            <div class="map-layer map-layer--default pixel-art"></div>
            <div class="map-layer map-layer--horizons pixel-art"></div>
            <div class="map-horizons-glow"></div>
            <div class="map-horizons-sweep"></div>
         </div>
         <div class="character" facing="down" walking="false">
            <div class="shadow pixel-art"></div>
            <div class="character_spritesheet pixel-art"></div>
         </div>
         <div class="map-item map-item--aiph pixel-art">
            <div class="item_shadow pixel-art"></div>
            <div class="item_sprite pixel-art aiph-glow">
               <div class="aiph-sparkles" aria-hidden="true">
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
               </div>
            </div>
         </div>
         <div class="map-item map-item--aiph2 pixel-art">
            <div class="item_shadow pixel-art"></div>
            <div class="item_sprite pixel-art aiph-glow">
               <div class="aiph-sparkles" aria-hidden="true">
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
               </div>
            </div>
         </div>
         <div class="map-item map-item--aiph3 pixel-art">
            <div class="item_shadow pixel-art"></div>
            <div class="item_sprite pixel-art aiph-glow">
               <div class="aiph-sparkles" aria-hidden="true">
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
                  <span class="aiph-spark"></span>
               </div>
            </div>
         </div>
         <div class="map-item map-item--brush pixel-art">
            <div class="item_shadow pixel-art"></div>
            <div class="item_sprite pixel-art"></div>
         </div>
         <div class="map-item map-item--html pixel-art">
            <div class="item_shadow pixel-art"></div>
            <div class="item_sprite pixel-art"></div>
         </div>
         <div class="map-item map-item--js pixel-art">
            <div class="item_shadow pixel-art"></div>
            <div class="item_sprite pixel-art"></div>
         </div>
         <div class="map-item map-item--coins pixel-art">
            <div class="item_shadow pixel-art"></div>
            <div class="item_sprite pixel-art"></div>
         </div>
         <div class="map-item map-item--robot pixel-art">
            <div class="item_shadow pixel-art"></div>
            <div class="item_sprite pixel-art"></div>
         </div>
      </div>


      <div class="dpad">
         <div class="DemoDirectionUI flex-center">
               <button class="dpad-button dpad-left">
                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -0.5 13 13" shape-rendering="crispEdges">
                       <path class="Arrow_outline-top"  stroke="#5f5f5f" d="M1 0h11M0 1h1M12 1h1M0 2h1M12 2h1M0 3h1M12 3h1M0 4h1M12 4h1M0 5h1M12 5h1M0 6h1M12 6h1M0 7h1M12 7h1M0 8h1M12 8h1" />
                       <path class="Arrow_surface" stroke="#f5f5f5" d="M1 1h11M1 2h11M1 3h5M7 3h5M1 4h4M7 4h5M1 5h3M7 5h5M1 6h4M7 6h5M1 7h5M7 7h5M1 8h11" />
                       <path class="Arrow_arrow-inset"  stroke="#434343" d="M6 3h1M5 4h1M4 5h1" />
                       <path class="Arrow_arrow-body" stroke="#5f5f5f" d="M6 4h1M5 5h2M5 6h2M6 7h1" />
                       <path class="Arrow_outline-bottom" stroke="#434343" d="M0 9h1M12 9h1M0 10h1M12 10h1M0 11h1M12 11h1M1 12h11" />
                       <path class="Arrow_edge" stroke="#ffffff" d="M1 9h11" />
                       <path class="Arrow_front" stroke="#cccccc" d="M1 10h11M1 11h11" />
                   </svg>
               </button>
               <button class="dpad-button dpad-up">
                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -0.5 13 13" shape-rendering="crispEdges">
                       <path class="Arrow_outline-top"  stroke="#5f5f5f" d="M1 0h11M0 1h1M12 1h1M0 2h1M12 2h1M0 3h1M12 3h1M0 4h1M12 4h1M0 5h1M12 5h1M0 6h1M12 6h1M0 7h1M12 7h1M0 8h1M12 8h1" />
                       <path class="Arrow_surface" stroke="#f5f5f5" d="M1 1h11M1 2h11M1 3h11M1 4h5M7 4h5M1 5h4M8 5h4M1 6h3M9 6h3M1 7h11M1 8h11" />
                       <path class="Arrow_arrow-inset"  stroke="#434343" d="M6 4h1M5 5h1M7 5h1" />
                       <path class="Arrow_arrow-body" stroke="#5f5f5f" d="M6 5h1M4 6h5" />
                       <path class="Arrow_outline-bottom" stroke="#434343" d="M0 9h1M12 9h1M0 10h1M12 10h1M0 11h1M12 11h1M1 12h11" />
                       <path class="Arrow_edge" stroke="#ffffff" d="M1 9h11" />
                       <path class="Arrow_front" stroke="#cccccc" d="M1 10h11M1 11h11" />
                   </svg>
               </button>
               <button class="dpad-button dpad-down">
                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -0.5 13 13" shape-rendering="crispEdges">
                       <path class="Arrow_outline-top" stroke="#5f5f5f" d="M1 0h11M0 1h1M12 1h1M0 2h1M12 2h1M0 3h1M12 3h1M0 4h1M12 4h1M0 5h1M12 5h1M0 6h1M12 6h1M0 7h1M12 7h1M0 8h1M12 8h1" />
                       <path class="Arrow_surface" stroke="#f5f5f5" d="M1 1h11M1 2h11M1 3h11M1 4h3M9 4h3M1 5h4M8 5h4M1 6h5M7 6h5M1 7h11M1 8h11" />
                       <path class="Arrow_arrow-inset" stroke="#434343" d="M4 4h5" />
                       <path class="Arrow_arrow-body" stroke="#5f5f5f" d="M5 5h3M6 6h1" />
                       <path class="Arrow_outline-bottom" stroke="#434343" d="M0 9h1M12 9h1M0 10h1M12 10h1M0 11h1M12 11h1M1 12h11" />
                       <path class="Arrow_edge" stroke="#ffffff" d="M1 9h11" />
                       <path class="Arrow_front" stroke="#cccccc" d="M1 10h11M1 11h11" />
                   </svg>
               </button>
               <button class="dpad-button dpad-right">
                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -0.5 13 13" shape-rendering="crispEdges">
                       <path class="Arrow_outline-top"  stroke="#5f5f5f" d="M1 0h11M0 1h1M12 1h1M0 2h1M12 2h1M0 3h1M12 3h1M0 4h1M12 4h1M0 5h1M12 5h1M0 6h1M12 6h1M0 7h1M12 7h1M0 8h1M12 8h1" />
                       <path class="Arrow_surface" stroke="#f5f5f5" d="M1 1h11M1 2h11M1 3h5M7 3h5M1 4h5M8 4h4M1 5h5M9 5h3M1 6h5M8 6h4M1 7h5M7 7h5M1 8h11" />
                       <path class="Arrow_arrow-inset"  stroke="#434343" d="M6 3h1M7 4h1M8 5h1" />
                       <path class="Arrow_arrow-body" stroke="#5f5f5f" d="M6 4h1M6 5h2M6 6h2M6 7h1" />
                       <path class="Arrow_outline-bottom" stroke="#434343" d="M0 9h1M12 9h1M0 10h1M12 10h1M0 11h1M12 11h1M1 12h11" />
                       <path class="Arrow_edge" stroke="#ffffff" d="M1 9h11" />
                       <path class="Arrow_front" stroke="#cccccc" d="M1 10h11M1 11h11" />
                   </svg>
               </button>
           </div>
      </div>
      
      
      <div class="hud">
         <div class="hud-portrait pixel-art"></div>
         <div class="hud-info">
            <p class="hud-level">Lv.0</p>
            <div class="hud-bar hud-hp">
               <span class="hud-bar-label pixel-art">HP</span>
               <div class="hud-bar-track pixel-art">
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
               </div>
            </div>
            <div class="hud-bar hud-mp">
               <span class="hud-bar-label pixel-art">MP</span>
               <div class="hud-bar-track pixel-art">
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
                  <span class="hud-pixel filled"></span>
               </div>
            </div>
         </div>
      </div>
      <p class="game-message" hidden></p>
      <div class="victory-overlay" hidden>
         <div class="victory-panel">
            <div class="victory-icon victory-icon--aiph pixel-art"></div>
            <p class="victory-title victory-title--secondary">UKOŃCZONO</p>
            <p class="victory-subtitle victory-subtitle--hero">AIPH EDYCJA 1</p>
            <p class="victory-hint victory-hint--skill">ODBLOKOWANO ULTIMATE SKILL GENERALISTA</p>
         </div>
      </div>
      <div class="skills-overlay" hidden>
         <div class="skills-panel">
            <p class="skills-title">SKILLE</p>
            <div class="skills-stage">
               <svg class="skills-links pixel-art" aria-hidden="true"></svg>
               <div class="skills-character character" facing="down" walking="false">
                  <div class="shadow pixel-art"></div>
                  <div class="character_spritesheet pixel-art"></div>
               </div>
               <div class="skills-aiph-sparkles" aria-hidden="true">
                  <div class="aiph-sparkles">
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                     <span class="aiph-spark"></span>
                  </div>
               </div>
               <div class="skills-slots"></div>
            </div>
         </div>
      </div>
      
      
      
   </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
